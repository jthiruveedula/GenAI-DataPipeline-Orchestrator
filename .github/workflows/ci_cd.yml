# GenAI-DataPipeline-Orchestrator CI/CD Pipeline
# Runs linting, tests, DAG integrity checks, and deploys to GCP Cloud Composer

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.10'
  AIRFLOW_VERSION: '2.7.3'

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Code Quality & Linting
  # -----------------------------------------------------------------------
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install black flake8 mypy

      - name: Run Black formatter check
        run: black --check --diff src/ dags/

      - name: Run Flake8 linter
        run: flake8 src/ dags/ --max-line-length=100 --ignore=E501,W503

      - name: Run MyPy type checker
        run: mypy src/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  # -----------------------------------------------------------------------
  # Job 2: Unit Tests
  # -----------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install apache-airflow==${{ env.AIRFLOW_VERSION }} \
            pytest pytest-cov pytest-mock \
            google-cloud-bigquery google-cloud-storage \
            vertexai pydantic

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml
        env:
          AIRFLOW__CORE__UNIT_TEST_MODE: 'True'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # -----------------------------------------------------------------------
  # Job 3: DAG Integrity Checks
  # -----------------------------------------------------------------------
  dag-integrity:
    name: DAG Integrity
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Airflow
        run: |
          pip install apache-airflow==${{ env.AIRFLOW_VERSION }} \
            apache-airflow-providers-google

      - name: Check DAG loading (no import errors)
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          os.environ.setdefault('AIRFLOW__CORE__UNIT_TEST_MODE', 'True')
          from airflow.models import DagBag
          dag_bag = DagBag(dag_folder='dags/', include_examples=False)
          assert len(dag_bag.import_errors) == 0, f'DAG import errors: {dag_bag.import_errors}'
          print(f'Successfully loaded {len(dag_bag.dags)} DAG(s)')
          "
        env:
          AIRFLOW__CORE__UNIT_TEST_MODE: 'True'
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: 'sqlite:////tmp/airflow.db'

  # -----------------------------------------------------------------------
  # Job 4: Security Scanning
  # -----------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scanner
        uses: PyCQA/bandit-action@v1
        with:
          targets: src/ dags/
          level: medium
          confidence: medium

  # -----------------------------------------------------------------------
  # Job 5: Deploy to Cloud Composer (main branch only)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Composer
    runs-on: ubuntu-latest
    needs: [test, dag-integrity]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write  # For Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy DAGs to Cloud Composer
        run: |
          gcloud composer environments storage dags import \
            --environment ${{ secrets.COMPOSER_ENVIRONMENT }} \
            --location ${{ secrets.COMPOSER_LOCATION }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --source dags/

      - name: Deploy plugins to Cloud Composer
        run: |
          if [ -d "plugins/" ]; then
            gcloud composer environments storage plugins import \
              --environment ${{ secrets.COMPOSER_ENVIRONMENT }} \
              --location ${{ secrets.COMPOSER_LOCATION }} \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --source plugins/
          fi

      - name: Notify Slack on success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: ':white_check_mark: GenAI Pipeline deployed to Cloud Composer successfully'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Slack on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: ':x: GenAI Pipeline deployment FAILED - check GitHub Actions logs'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

